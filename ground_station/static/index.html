<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGS-2 | Swarm Ground Station</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono&display=swap"
        rel="stylesheet">
    <!-- Leaflet mapping -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body class="dark-theme">
    <div class="overlay"></div>
    <header>
        <div class="logo-section">
            <span class="pulse"></span>
            <h1>SWARM_COMMAND_V2 // SENTINEL_ACTIVE</h1>
        </div>
        <div class="status-bar">
            <div class="status-item"><span class="label">NODES:</span> <span id="node-count" class="value ok">0</span>
            </div>
            <div class="status-item"><span class="label">THREAT:</span> <span id="global-threat"
                    class="value ok">SECURE</span></div>
            <div class="status-item"><span id="clock" class="value">00:00:00</span></div>
        </div>
    </header>

    <main>
        <div class="dashboard-layout">
            <!-- Left Panel: Map & Global Stats -->
            <div class="left-panel">
                <div class="card map-card">
                    <h3>ORBITAL_LIVE_TRACKING</h3>
                    <div id="map"></div>
                </div>
                <div class="card threat-gauge-card">
                    <h3>AI_SENTINEL_THREAT_MONITOR</h3>
                    <div class="threat-container">
                        <div class="threat-ring" id="threat-ring">
                            <span id="threat-pct">0</span><small>%</small>
                        </div>
                        <div class="threat-labels">
                            <div id="threat-status">SYSTEM_SECURE</div>
                            <small id="threat-msg">No anomalies detected in the last 60s.</small>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Node Details -->
            <div class="right-panel">
                <div class="card node-selector-card">
                    <h3>SWARM_NODES</h3>
                    <div id="node-list" class="node-list">
                        <!-- Dynamic nodes -->
                    </div>
                </div>

                <div class="card detail-card" id="detail-card">
                    <h3>NODE_DATA: <span id="current-node-name">NONE</span></h3>
                    <div class="satellite-visual-small">
                        <div id="satellite-model" class="satellite">
                            <div class="body"></div>
                            <div class="panel left"></div>
                            <div class="panel right"></div>
                        </div>
                    </div>
                    <div class="stats-mini">
                        <div class="stat">ALT: <span id="val-alt">0</span>m</div>
                        <div class="stat">BAT: <span id="val-bat">0</span>%</div>
                        <div class="stat">POS: <span id="val-pos">0,0</span></div>
                    </div>
                </div>

                <div class="card terminal-card">
                    <h3>SECURE_UPLINK</h3>
                    <div id="terminal-out" class="terminal-display"></div>
                    <div class="terminal-input">
                        <span>></span>
                        <input type="text" id="cmd-input" placeholder="Enter secure command...">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let map;
        let markers = {};
        let selectedNode = null;
        const satIcon = L.divIcon({
            className: 'sat-marker',
            html: '<div class="icon-core"></div>',
            iconSize: [12, 12]
        });

        function initMap() {
            map = L.map('map').setView([41.0082, 28.9784], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);
        }

        async function updateSwarm() {
            try {
                const response = await fetch('/api/telemetry');
                const swarm = await response.json();
                const nodeIds = Object.keys(swarm);
                document.getElementById('node-count').innerText = nodeIds.length;

                let maxThreat = 0;
                let threatMsg = "All systems nominal.";

                nodeIds.forEach(id => {
                    const data = swarm[id];
                    const dec = data.decrypted;

                    // Update Markers
                    if (!markers[id]) {
                        markers[id] = L.marker([dec.lat, dec.lon], { icon: satIcon }).addTo(map);
                        markers[id].bindPopup(`Satellite: ${id}`);

                        // Add to node list
                        const list = document.getElementById('node-list');
                        const btn = document.createElement('button');
                        btn.className = 'node-btn';
                        btn.innerText = id;
                        btn.onclick = () => selectNode(id);
                        btn.id = `btn-${id}`;
                        list.appendChild(btn);
                    } else {
                        markers[id].setLatLng([dec.lat, dec.lon]);
                    }

                    if (data.threat_level > maxThreat) {
                        maxThreat = data.threat_level;
                        if (maxThreat > 50) threatMsg = `Anomaly detected on ${id}`;
                    }

                    // Update selected node details
                    if (selectedNode === id) {
                        updateDetailPanel(id, data);
                    }
                });

                updateThreatGauge(maxThreat, threatMsg);

            } catch (e) {
                console.error("SWARM_SYNC_ERR", e);
            }
        }

        function selectNode(id) {
            selectedNode = id;
            document.querySelectorAll('.node-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${id}`).classList.add('active');
            document.getElementById('current-node-name').innerText = id;
        }

        function updateDetailPanel(id, data) {
            const dec = data.decrypted;
            document.getElementById('val-alt').innerText = dec.altitude;
            document.getElementById('val-bat').innerText = dec.battery;
            document.getElementById('val-pos').innerText = `${dec.lat.toFixed(4)}, ${dec.lon.toFixed(4)}`;

            // Rotate model
            const model = document.getElementById('satellite-model');
            model.style.transform = `rotateX(${dec.pitch}deg) rotateY(${dec.yaw}deg) rotateZ(${dec.roll}deg)`;
        }

        function updateThreatGauge(level, msg) {
            document.getElementById('threat-pct').innerText = level;
            document.getElementById('threat-msg').innerText = msg;
            const ring = document.getElementById('threat-ring');
            const status = document.getElementById('threat-status');
            const globalT = document.getElementById('global-threat');

            ring.style.boxShadow = `0 0 20px ${level > 50 ? '#f85149' : '#58a6ff'}`;

            if (level < 20) {
                status.innerText = "SYSTEM_SECURE";
                status.style.color = "#3fb950";
                globalT.className = "value ok";
                globalT.innerText = "SECURE";
            } else if (level < 60) {
                status.innerText = "WARNING_STATE";
                status.style.color = "#d29922";
                globalT.className = "value warn";
                globalT.innerText = "WARNING";
            } else {
                status.innerText = "CRITICAL_THREAT";
                status.style.color = "#f85149";
                globalT.className = "value error";
                globalT.innerText = "CRITICAL";
            }
        }

        initMap();
        setInterval(updateSwarm, 1000);
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        document.getElementById('cmd-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const cmd = this.value;
                const term = document.getElementById('terminal-out');
                const line = document.createElement('div');
                line.className = 'line cmd';
                line.innerText = `> [${selectedNode || 'ALL'}] ${cmd}`;
                term.appendChild(line);
                this.value = '';

                fetch('/api/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: cmd, target: selectedNode })
                });
            }
        });
    </script>
</body>

</html>
